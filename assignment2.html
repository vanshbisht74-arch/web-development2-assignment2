<!DOCTYPE html>
<html>
<head>
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="assignment2.css">
</head>

<body>

<h2>Async Weather Tracker</h2>

<div class="main">

<div class="left">

<h4>Search City</h4>

<input type="text" id="city">

<button onclick="searchWeather()">Search</button>

<h4>Search History</h4>

<div id="history"></div>

</div>

<div class="right">

<h4>Weather Info</h4>

<p>City <span id="cityName"></span></p>
<p>Temp <span id="temp"></span></p>
<p>Weather <span id="weather"></span></p>
<p>Humidity <span id="humidity"></span></p>
<p>Wind <span id="wind"></span></p>

</div>

</div>

<div class="console">

<h4>Console – Event Loop</h4>

<div id="log"></div>

</div>

<script src="assignment2.js
"></script>

</body>
</html>
